name: API Health Check

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TUIST_TOKEN: ${{ secrets.TUIST_TOKEN }}
  
jobs:
  api-tests:
    name: Run API Tests
    runs-on: [ self-hosted, iOS ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8
        with:
          cache: false

      - name: Create test env
        env:
          ENV_PATH: "MailTests/Env.swift"
          UI_ENV_PATH: "MailUITests/Env.swift"
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          MAILBOX_ID: ${{ secrets.MAILBOX_ID }}
          MAILBOX_UUID: ${{ secrets.MAILBOX_UUID }}
        run: |
          touch $ENV_PATH
          echo -e "enum Env {\n static let token = \"$ACCESS_TOKEN\"\n static let userId = $USER_ID\n static let mailboxId = $MAILBOX_ID\n static let mailboxUuid = \"$MAILBOX_UUID\"\n}" > $ENV_PATH
          touch $UI_ENV_PATH
          echo -e "enum Env {\n static let testAccountEmail = \"\"\n static let testAccountPassword = \"\"\n}" > $UI_ENV_PATH

      - name: Setup
        run: tuist install && tuist generate --no-open

      - name: Run API Tests
        run: tuist test Mail-Workspace --test-targets MailTests/MailApiTests --no-selective-testing
