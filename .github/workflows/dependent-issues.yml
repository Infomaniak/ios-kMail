name: Dependent Issues

on:
  issues:
    types:
      - opened
      - edited
      - closed
      - reopened
  pull_request:
    types:
      - opened
      - edited
      - closed
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check_dependencies:
    if: github.event_name == 'issues' || github.event.pull_request.head.repo.full_name == github.repository
    uses: infomaniak/.github/.github/workflows/dependent-issues.yml@v2
    secrets: inherit
