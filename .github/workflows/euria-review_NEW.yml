name: NEW NEW Euria Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
  
    permissions:
      contents: write
      pull-requests: write
      issues: write
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: PR Agent action step
      uses: qodo-ai/pr-agent@main
      env:
        # OPENAI__KEY: ${{ secrets.EURIA_API_KEY }}
        OPENAI_KEY: ${{ secrets.EURIA_API_KEY }}
        OPENAI_API_BASE: "https://api.infomaniak.com/2/ai/27/openai/v1"
        CONFIG__MODEL: "Kimi-K2.5"
        CONFIG__FALLBACK_MODELS: '[]'  # Empty array = no fallback
        CONFIG__CUSTOM_MODEL_MAX_TOKENS: "128000"  # Required for custom models
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        github_action_config.auto_review: "true"
        github_action_config.auto_describe: "false"
        github_action_config.auto_improve: "false"
        github_action_config.pr_actions: '["opened","reopened","ready_for_review","synchronize"]'
        