name: NEW NEW Euria Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
  
    permissions:
      contents: write
      pull-requests: write
      issues: write
          
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: PR Agent action step
      uses: qodo-ai/pr-agent@main  # Updated to qodo-ai
      env:
        OPENAI__KEY: ${{ secrets.EURIA_API_KEY }}
        OPENAI__API_BASE: "https://api.infomaniak.com/2/ai/27/openai/v1"
        CONFIG__MODEL: "moonshotai/Kimi-K2.5"
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        github_action_config.auto_review: "true"
        github_action_config.auto_describe: "false"
        github_action_config.auto_improve: "false"
        github_action_config.pr_actions: '["opened","reopened","ready_for_review","synchronize"]'
