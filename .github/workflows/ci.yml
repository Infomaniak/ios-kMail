name: CI workflow

on: pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  
env:
  TUIST_TOKEN: ${{ secrets.TUIST_TOKEN }}

jobs:
  build:
    name: Build and Test project
    runs-on: [ self-hosted, iOS ]
    env:
      DERIVED_DATA_PATH: ${{ github.workspace }}/DerivedData

    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@6d1e696aa24c1aa1bcc1adea0212707c71ab78a8
        with:
          cache: false
      - name: Create test env
        env:
          ENV_PATH: "MailTests/Env.swift"
          UI_ENV_PATH: "MailUITests/Env.swift"
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
          MAILBOX_ID: ${{ secrets.MAILBOX_ID }}
          MAILBOX_UUID: ${{ secrets.MAILBOX_UUID }}
        run: |
          touch $ENV_PATH
          echo -e "enum Env {\n static let token = \"$ACCESS_TOKEN\"\n static let userId = $USER_ID\n static let mailboxId = $MAILBOX_ID\n static let mailboxUuid = \"$MAILBOX_UUID\"\n}" > $ENV_PATH
          touch $UI_ENV_PATH
          echo -e "enum Env {\n static let testAccountEmail = \"\"\n static let testAccountPassword = \"\"\n}" > $UI_ENV_PATH
      - name: Generate
        run: tuist install && tuist generate
      - name: Check implicit imports
        run: tuist inspect implicit-imports
      - name: Build iOS / iPadOS
        run: tuist build --clean --derived-data-path "$DERIVED_DATA_PATH" "Infomaniak Mail"
      - name: Build macOS
        run: tuist build "Infomaniak Mail Lite" --derived-data-path "$DERIVED_DATA_PATH" -- -destination 'platform=macOS,arch=arm64,variant=Mac Catalyst,name=My Mac' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
      - name: Unit and Integration Tests
        run: tuist test Mail-Workspace --skip-test-targets MailUITests/MailUITests --no-selective-testing --derived-data-path "$DERIVED_DATA_PATH"
      - name: Periphery
        run: |
          INDEX_STORE_PATH="$DERIVED_DATA_PATH/Index.noindex/DataStore"
          test -d "$INDEX_STORE_PATH"
          periphery scan --retain-codable-properties --format github-actions --relative-results --strict --skip-build --index-store-path "$INDEX_STORE_PATH"

